services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: football-backend
    volumes:
      - ./Backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - BACKEND_URL=http://localhost:3000
      - FRONTEND_URL=http://localhost:5173
      - FOOTBALL_API_URL=https://api.football-data.org/v4/
      # - FOOTBALL_API_KEY=tu_api_key_aqui 
      # - JWT_SECRET=super_secreto
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: football-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_FRONTEND_URL=http://localhost
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: proxy_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
